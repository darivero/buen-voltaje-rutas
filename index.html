<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buen Voltaje Rutas</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      padding: 14px;
      background: #111;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0;
      color: #ffd400;
      font-size: 22px;
    }

    .panel {
      padding: 12px;
      background: #1c1c1c;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 6px;
      color: #ccc;
    }

    select, input {
      width: 100%;
      padding: 13px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ffd400;
      color: #111;
      font-weight: bold;
      font-size: 16px;
      margin-top: 8px;
    }

    .secondary {
      background: #333;
      color: white;
    }

    #map {
      height: 55vh;
      width: 100%;
    }

    .status {
      font-size: 13px;
      color: #bbb;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <header>
    <h1>⚡ Buen Voltaje Rutas</h1>
  </header>

  <div class="panel">
    <label>¿Qué querés buscar?</label>
    <select id="tipo">
      <option value="hardware">Ferreterías</option>
      <option value="electrical">Casas de electricidad</option>
      <option value="refrigeration">Refrigeración / Aire acondicionado</option>
      <option value="building_materials">Corralones</option>
    </select>

    <label>¿Cuántos lugares querés visitar?</label>
    <input id="cantidad" type="number" min="1" max="20" value="5">

    <button onclick="generarRecorrido()">🚗 Buscar lugares cercanos</button>
    <button class="secondary" onclick="abrirGoogleMaps()">🗺️ Abrir búsqueda en Google Maps</button>

    <div id="estado" class="status">Tocá “Buscar lugares cercanos”.</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    let map;
    let ubicacion = null;
    let marcadorUsuario = null;
    let marcadores = [];
    let lugaresEncontrados = [];

    map = L.map("map").setView([-34.60, -58.45], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "OpenStreetMap"
    }).addTo(map);

    function generarRecorrido() {
      const estado = document.getElementById("estado");
      estado.innerText = "Detectando ubicación...";

      if (!navigator.geolocation) {
        estado.innerText = "Tu navegador no permite usar ubicación.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          ubicacion = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };

          mostrarMiUbicacion();
          buscarLugares();
        },
        function() {
          estado.innerText = "No pude obtener tu ubicación. Revisá permisos de ubicación en Safari.";
        }
      );
    }

    function mostrarMiUbicacion() {
      map.setView([ubicacion.lat, ubicacion.lng], 15);

      if (marcadorUsuario) {
        map.removeLayer(marcadorUsuario);
      }

      marcadorUsuario = L.marker([ubicacion.lat, ubicacion.lng])
        .addTo(map)
        .bindPopup("📍 Estás acá")
        .openPopup();
    }

    async function buscarLugares() {
      const estado = document.getElementById("estado");
      const cantidad = parseInt(document.getElementById("cantidad").value);
      const tipo = document.getElementById("tipo").value;

      estado.innerText = "Buscando lugares cercanos...";

      marcadores.forEach(m => map.removeLayer(m));
      marcadores = [];
      lugaresEncontrados = [];

      let filtro = "";

      if (tipo === "hardware") {
        filtro = '["shop"="hardware"]';
      }

      if (tipo === "electrical") {
        filtro = '["shop"="electrical"]';
      }

      if (tipo === "refrigeration") {
        filtro = '["shop"~"refrigeration|air_conditioning|electronics"]';
      }

      if (tipo === "building_materials") {
        filtro = '["shop"~"building_materials|doityourself"]';
      }

      const radio = 5000;

      const query = `
        [out:json][timeout:25];
        (
          node${filtro}(around:${radio},${ubicacion.lat},${ubicacion.lng});
          way${filtro}(around:${radio},${ubicacion.lat},${ubicacion.lng});
          relation${filtro}(around:${radio},${ubicacion.lat},${ubicacion.lng});
        );
        out center tags;
      `;

      const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

      try {
        const res = await fetch(url);
        const data = await res.json();

        lugaresEncontrados = data.elements
          .map(el => {
            const lat = el.lat || el.center?.lat;
            const lng = el.lon || el.center?.lon;
            const nombre = el.tags?.name || "Comercio sin nombre";

            if (!lat || !lng) return null;

            return {
              nombre,
              lat,
              lng,
              distancia: calcularDistancia(ubicacion.lat, ubicacion.lng, lat, lng)
            };
          })
          .filter(Boolean)
          .sort((a, b) => a.distancia - b.distancia)
          .slice(0, cantidad);

        lugaresEncontrados.forEach((lugar, index) => {
          const marker = L.marker([lugar.lat, lugar.lng])
            .addTo(map)
            .bindPopup(
              `<b>${index + 1}. ${lugar.nombre}</b><br>${lugar.distancia.toFixed(2)} km`
            );

          marcadores.push(marker);
        });

        if (lugaresEncontrados.length === 0) {
          estado.innerText = "No encontré resultados cerca. Probá ampliar búsqueda con Google Maps.";
          return;
        }

        estado.innerText =
          `Encontré ${lugaresEncontrados.length} lugares. Próximo paso: calcular ruta más corta en auto.`;

        ajustarMapa();

      } catch (error) {
        estado.innerText = "No pude buscar comercios. Probá nuevamente.";
      }
    }

    function ajustarMapa() {
      const puntos = [[ubicacion.lat, ubicacion.lng]];

      lugaresEncontrados.forEach(l => {
        puntos.push([l.lat, l.lng]);
      });

      const bounds = L.latLngBounds(puntos);
      map.fitBounds(bounds, { padding: [40, 40] });
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function abrirGoogleMaps() {
      if (!ubicacion) {
        alert("Primero tocá Buscar lugares cercanos.");
        return;
      }

      const tipo = document.getElementById("tipo").value;
      let texto = "ferreterías";

      if (tipo === "electrical") texto = "casas de electricidad";
      if (tipo === "refrigeration") texto = "refrigeración aire acondicionado";
      if (tipo === "building_materials") texto = "corralones";

      const url = `https://www.google.com/maps/search/${encodeURIComponent(texto)}/@${ubicacion.lat},${ubicacion.lng},15z`;
      window.location.href = url;
    }
  </script>
</body>
</html>
