<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buen Voltaje Rutas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    .app {
      max-width: 430px;
      margin: auto;
    }

    h1 {
      color: #ffd400;
      font-size: 30px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
    }

    input {
      width: 100%;
      font-size: 24px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 14px;
      background: #ffd400;
      color: #111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .secondary {
      background: #333;
      color: white;
    }

    .status {
      color: #bbb;
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>⚡ Buen Voltaje Rutas</h1>

    <div class="card">
      <h2>🚗 Dejar flyers</h2>
      <p>Buscamos ferreterías cercanas desde tu ubicación actual.</p>

      <label>¿Cuántas ferreterías querés visitar?</label>
      <input id="cantidad" type="number" min="1" max="20" value="5">

      <button onclick="buscarFerreterias()">
        📍 Buscar ferreterías cercanas
      </button>

      <button class="secondary" onclick="abrirBusqueda('ferreterías cerca de')">
        🗺️ Abrir en Google Maps
      </button>

      <p id="estado" class="status">
        Primero tocá “Buscar ferreterías cercanas”.
      </p>
    </div>

    <div class="card">
      <h2>🛒 Buscar materiales cerca</h2>
      <p>Encontrá proveedores según dónde estés.</p>

      <button onclick="abrirBusqueda('ferreterías cerca de')">
        🔩 Ferreterías
      </button>

      <button onclick="abrirBusqueda('casas de electricidad cerca de')">
        ⚡ Casas de electricidad
      </button>

      <button onclick="abrirBusqueda('refrigeración aire acondicionado cerca de')">
        ❄️ Refrigeración / Aire acondicionado
      </button>

      <button onclick="abrirBusqueda('corralones cerca de')">
        🧱 Corralones
      </button>
    </div>
  </div>

  <script>
    let ubicacion = null;

    function obtenerUbicacion(callback) {
      const estado = document.getElementById("estado");

      if (!navigator.geolocation) {
        estado.innerText = "Tu navegador no permite usar ubicación.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          ubicacion = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };
          callback();
        },
        function() {
          estado.innerText = "No pude obtener tu ubicación. Revisá los permisos del navegador.";
        }
      );
    }

    function buscarFerreterias() {
      const estado = document.getElementById("estado");
      const cantidad = document.getElementById("cantidad").value;

      estado.innerText = "Detectando tu ubicación...";

      obtenerUbicacion(function() {
        estado.innerText =
          "Ubicación detectada. Buscaremos hasta " +
          cantidad +
          " ferreterías cercanas.";
      });
    }

    function abrirBusqueda(tipo) {
      const estado = document.getElementById("estado");

      obtenerUbicacion(function() {
        const texto = tipo + " " + ubicacion.lat + "," + ubicacion.lng;
        const url = "https://www.google.com/maps/search/" + encodeURIComponent(texto);
        window.open(url, "_blank");
      });
    }
  </script>
</body>
</html>
